<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 20px 24px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px 16px; }
  .swatch { width: 48px; height: 48px; }
</style></head><body>
  <div class="grid">
    <div class="tile"><div class="swatch" style="background:var(--ag-green)"></div><div class="label">Green · accent</div><div class="mono">#55BCAD</div></div>
    <div class="tile"><div class="swatch" style="background:var(--ag-green-tint)"></div><div class="label">Green tint · Remboursé</div><div class="mono">#90ECB2</div></div>
    <div class="tile"><div class="swatch" style="background:var(--ag-yellow)"></div><div class="label">Yellow · Dépensé</div><div class="mono">#FBDC6C</div></div>
    <div class="tile"><div class="swatch" style="background:var(--ag-cyan)"></div><div class="label">Cyan · tiers border</div><div class="mono">#60C2E5</div></div>
    <div class="tile"><div class="swatch" style="background:var(--ag-cyan-tint)"></div><div class="label">Cyan tint · tiers bg</div><div class="mono">#B5DCE9</div></div>
    <div class="tile"><div class="swatch" style="background:var(--ag-pink)"></div><div class="label">Pink · avatar F</div><div class="mono">#F098DA</div></div>
    <div class="tile"><div class="swatch" style="background:var(--ag-violet)"></div><div class="label">Violet · avatar M</div><div class="mono">#9DAFFF</div></div>
    <div class="tile"><div class="swatch" style="background:var(--ag-orange)"></div><div class="label">Orange · chart</div><div class="mono">#EE8339</div></div>
  </div>
</body></html>
