<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 20px 24px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
</style></head><body>
  <div class="grid">
    <div class="tile"><div class="swatch" style="background:var(--ag-ink)"></div><div class="label">Ink · ag-ink</div><div class="mono">#0C0C0C</div></div>
    <div class="tile"><div class="swatch" style="background:var(--ag-grey)"></div><div class="label">Grey · ag-grey</div><div class="mono">#666666</div></div>
    <div class="tile"><div class="swatch" style="background:var(--ag-grey-light)"></div><div class="label">Light · ag-grey-light</div><div class="mono">#BBBBBB</div></div>
    <div class="tile"><div class="swatch" style="background:var(--ag-rule);box-shadow:inset 0 0 0 1px rgba(0,0,0,.06)"></div><div class="label">Rule · ag-rule</div><div class="mono">#EDEDED</div></div>
  </div>
</body></html>
