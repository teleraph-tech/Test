<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px; background: var(--ag-blue-tint); }
  .wrap { display: flex; flex-direction: column; gap: 16px; }
  .card {
    display: flex; height: 80px; border-radius: 8px; overflow: hidden;
    box-shadow: var(--shadow-card);
  }
  .rail { width: 48px; background: var(--ag-ink); display:flex; align-items:center; justify-content:center; color: #fff; }
  .body { flex: 1; background: #fff; padding: 16px 20px; display:flex; align-items:center; justify-content:space-between; }
  .name { font: 700 16px/1.4 var(--font-sans); color: var(--ag-ink); }
  .num  { font: 400 14px/1.4 var(--font-sans); color: var(--fg-2); margin-left: 8px; }
  .sub  { font: 400 14px/1.4 var(--font-sans); color: var(--fg-2); margin-top: 4px; }
  .price { font: 700 16px/1.4 var(--font-sans); color: var(--ag-ink); text-align: right; }
  .priceSub { font: 400 14px/1.4 var(--font-sans); color: var(--fg-2); margin-top: 4px; text-align: right; }
  .selected { border: 1.6px solid var(--ag-blue); }
  .selected .rail { background: var(--ag-blue); }
  .selected .name, .selected .price { color: var(--ag-blue); }
  .ico { width: 24px; height: 24px; }
  .ico path, .ico rect { fill: currentColor; }
</style></head><body>
  <div class="wrap">
    <div class="card">
      <div class="rail">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="3"/><rect x="4" y="9" width="16" height="11" rx="1"/><path d="M9 13h6" stroke-linecap="round"/></svg>
      </div>
      <div class="body">
        <div><span class="name">Vivepargne</span><span class="num">· 00123456</span><div class="sub">Assurance vie multisupport</div></div>
        <div><div class="price">22 500,00 €</div><div class="priceSub">Estim. au 19/06/2021</div></div>
      </div>
    </div>
    <div class="card selected">
      <div class="rail">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="3"/><rect x="4" y="9" width="16" height="11" rx="1"/><path d="M9 13h6" stroke-linecap="round"/></svg>
      </div>
      <div class="body">
        <div><span class="name">Vivepargne</span><span class="num">· 00123456</span><div class="sub">Assurance vie multisupport — selected</div></div>
        <div><div class="price">22 500,00 €</div><div class="priceSub">Estim. au 19/06/2021</div></div>
      </div>
    </div>
  </div>
</body></html>
