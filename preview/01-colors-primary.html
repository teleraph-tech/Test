<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 20px 24px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
</style></head><body>
  <div class="grid">
    <div class="tile"><div class="swatch" style="background:var(--ag-blue)"></div><div class="label">Brand · ag-blue</div><div class="mono">#0242F4 · rgb(2,66,244)</div></div>
    <div class="tile"><div class="swatch" style="background:var(--ag-blue-tint)"></div><div class="label">Section · ag-blue-tint</div><div class="mono">#E6EEFD</div></div>
    <div class="tile"><div class="swatch" style="background:var(--ag-blue-shadow)"></div><div class="label">Shadow · ag-blue-shadow</div><div class="mono">#B0BCE0</div></div>
    <div class="tile"><div class="swatch" style="background:#fff;box-shadow:inset 0 0 0 1px var(--border-rule),0 4px 16px var(--ag-blue-shadow-75)"></div><div class="label">Surface · on shadow</div><div class="mono">#FFFFFF</div></div>
  </div>
</body></html>
