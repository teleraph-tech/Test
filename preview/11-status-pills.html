<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px; }
  .row { gap: 16px; flex-wrap: wrap; align-items: center; }
  .pill { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 8px; font: 400 12px/1.4 var(--font-sans); color: var(--fg-1); }
  .pill.r { background: var(--ag-green-tint); }
  .pill.d { background: var(--ag-yellow); }
  .pill.tp { background: transparent; color: var(--fg-2); border: 1px solid var(--ag-rule); }
  .grow {
    display:inline-flex; align-items:center; gap:4px; padding:4px 8px; border-radius:40px;
    background: var(--ag-green-tint); font: 400 12px/1.4 var(--font-sans); color: var(--fg-1);
  }
  .arrow {
    width:16px; height:16px; background: var(--ag-green); border-radius: 9999px;
    display:inline-flex; align-items:center; justify-content:center;
  }
  .arrow svg { width:10px; height:10px; }
  .lab { font: 400 11px/1 ui-monospace, "SF Mono", Menlo, monospace; color: var(--fg-2); margin-top: 6px; }
  .stack { display:flex; flex-direction:column; gap:6px; align-items:flex-start; }
</style></head><body>
  <div class="row">
    <div class="stack"><span class="pill r">Remboursé</span><div class="lab">positive</div></div>
    <div class="stack"><span class="pill d">Dépensé</span><div class="lab">neutral</div></div>
    <div class="stack"><span class="pill tp">Tiers payant</span><div class="lab">subtle</div></div>
    <div class="stack">
      <span class="grow"><span class="arrow"><svg viewBox="0 0 10 10" fill="#fff"><path d="M5 2 L8 6 H6 V8 H4 V6 H2 Z"/></svg></span>1 245,67 €</span>
      <div class="lab">growth pill · 40r</div>
    </div>
  </div>
</body></html>
