<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    html, body { margin: 0; padding: 0; background: #fff; }
    body { padding: 24px 28px; box-sizing: border-box; }
    .row { display: flex; align-items: baseline; gap: 24px; padding: 10px 0; border-bottom: 1px solid var(--ag-rule); }
    .row:last-child { border-bottom: none; }
    .tag { width: 88px; font-size: 11px; color: var(--fg-2); font-family: ui-monospace, "SF Mono", Menlo, monospace; flex-shrink: 0; }
    .specimen { flex: 1; }
  </style>
</head>
<body>
  <div class="row"><div class="tag">24 / 500</div><div class="specimen t-display">Bienvenue Marie Dupont</div></div>
  <div class="row"><div class="tag">16 / 700</div><div class="specimen t-title">Votre carte tiers payant</div></div>
  <div class="row"><div class="tag">14 / 700</div><div class="specimen" style="font-weight:700; color:var(--fg-1); font-size:14px">Faire un versement</div></div>
  <div class="row"><div class="tag">14 / 400</div><div class="specimen t-body">Soin du 21/02/2021 · Inès Cordonnier</div></div>
  <div class="row"><div class="tag">12 / 700</div><div class="specimen t-eyebrow">Documents contractuels</div></div>
  <div class="row"><div class="tag">12 / 400</div><div class="specimen t-meta">N°Adhérent : 0123456789</div></div>
</body>
</html>
