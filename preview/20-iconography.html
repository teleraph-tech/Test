<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<link rel="stylesheet" href="../assets/icons.css">
<style>
  body { padding: 24px; gap: 12px; }
  .label { font: 700 12px/1.4 var(--font-sans); color: var(--fg-1); margin-bottom: 6px; }
  .row { display:flex; gap: 28px; align-items:center; flex-wrap: wrap; }
  .icon { width: 24px; height: 24px; color: var(--ag-ink); }
  .name { font: 400 11px/1 ui-monospace, "SF Mono", Menlo, monospace; color: var(--fg-2); }
  .stack { display:flex; flex-direction:column; align-items:center; gap:8px; }
</style></head><body>
  <div class="label">Brand-supplied stroke icons · 24px artboard · 2px stroke</div>
  <div class="row">
    <div class="stack"><span class="i i-heart icon"></span><span class="name">heart</span></div>
    <div class="stack"><span class="i i-calendar icon"></span><span class="name">calendar</span></div>
    <div class="stack"><span class="i i-piggy icon"></span><span class="name">piggybank</span></div>
    <div class="stack"><span class="i i-file icon"></span><span class="name">file</span></div>
    <div class="stack"><span class="i i-bell icon"></span><span class="name">bell</span></div>
    <div class="stack"><span class="i i-arrow-up icon"></span><span class="name">arrow-up</span></div>
    <div class="stack"><span class="i i-arrow-enter icon"></span><span class="name">arrow-enter</span></div>
  </div>
</body></html>
